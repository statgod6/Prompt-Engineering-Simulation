services:
  # Backend API (FastAPI)
  - type: web
    name: promptlab-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./promptlab.db
      - key: SECRET_KEY
        generateValue: true
      - key: DAILY_TOKEN_BUDGET
        value: "100000"
      - key: CORS_ORIGINS
        value: "https://promptlab.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # Frontend (React Static Site)
  - type: web
    name: promptlab
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://promptlab-api.onrender.com/api"
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
